<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trans Liberation NCL - Venue List</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styling/main.css" />
    <link rel="stylesheet" href="styling/calendar.css" /> <!-- Reusing btn-brutal styles -->
    <link rel="stylesheet" href="styling/venue-list.css" />

    <!-- ====== CUSTOM JS ====== -->
    <script src="js/theme.js" defer></script>
    <script src="data/venuelist.js" defer></script>
    <script src="js/venue-list.js" defer></script>

</head>

<body>

    <!-- ====== BANNER ====== -->
    <header class="banner text-center">
        <div class="container">
            <a href="index.html" class="text-decoration-none text-light">
            <h1 class="display-2 fw-black mb-3 d-flex align-items-center gap-3 justify-content-center text-uppercase italic">
                <img src="Resources/Images/Logo.png" alt="Trans Liberation NCL Logo" class="img-fluid" style="max-height: 60px; width: auto;" />
                <span>Trans Liberation NCL</span>
            </h1>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="venue-list-container mt-5">
            
            <div class="d-flex align-items-center mb-5">
                <div class="flex-grow-1 border-top border-4 border-dark-subtle"></div>
                <h2 class="h1 fw-black text-uppercase m-0 section-title px-4" id="list-title">Greenlist</h2>
                <div class="flex-grow-1 border-top border-4 border-dark-subtle"></div>
            </div>

            <!-- Toggle Button -->
            <div class="d-flex justify-content-center mb-4">
                <div class="toggle-switch">
                    <input type="checkbox" id="listToggle" class="toggle-switch-checkbox" checked>
                    <label for="listToggle" class="toggle-switch-label">
                        <span class="toggle-switch-inner"></span>
                        <span class="toggle-switch-switch"></span>
                    </label>
                </div>
            </div>

            <!-- Venue List -->
            <div id="venue-list-display" class="row g-4">
                <!-- Venue cards will be injected here by JavaScript -->
            </div>

        </div>
    </main>

</body>
</html>
