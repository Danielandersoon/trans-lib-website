<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trans Liberation NCL</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styling/main.css" />

    <!-- ====== CUSTOM JS ====== -->
    <script src="js/theme.js" defer></script>
    <script src="data/home-page-cards.js"></script>
    <script src="js/cards.js" defer></script>

</head>

<body>

    <!-- ====== BANNER ====== -->
    <header class="banner text-center">
        <div class="container">
            <a href="index.html" class="text-decoration-none text-light">
            <h1 class="display-2 fw-black mb-3 d-flex align-items-center gap-3 justify-content-center text-uppercase italic">
                <img src="Resources/Images/Logo.png" alt="Trans Liberation NCL Logo" class="img-fluid" style="max-height: 60px; width: auto;" />
                <span>Trans Liberation NCL</span>
            </h1>
            </a>
            <p class="h4 fw-bold mb-0">
                Resisting the attempt to push trans people into hiding from society <br>
                <span class="highlight">No one is free until all are free.</span> Demanding equality be a right, not a privilege.
            </p>
        </div>
    </header>

    <!-- ====== CARDS SECTION ====== -->
    <main class="container">

        <!-- section title -->
        <div class="d-flex align-items-center gap-2 mb-5">
            <h2 class="h1 fw-black text-uppercase m-0 section-title">Our Pages</h2>
            <div class="flex-grow-1 border-top border-4 border-dark-subtle ms-3"></div>
        </div>

        <div class="row g-4" id="cards-container"></div><!-- /row -->

        <!-- optional: extra note -->
        <p class="text-center text-secondary mt-4 small">
            <i class="bi bi-info-circle me-1"></i>
            Cards without an image show text only — perfect for quick links.
        </p>

    </main>

</body>
</html>
