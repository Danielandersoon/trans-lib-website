<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trans Liberation NCL</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styling/main.css" />
    <link rel="stylesheet" href="styling/calendar.css" />

    <!-- ====== CUSTOM JS ====== -->
    <script src="js/theme.js" defer></script>
    <script src="data/events.js" defer></script>
    <script src="js/events.js" defer></script>

</head>

<body>

    <!-- ====== BANNER ====== -->
    <header class="banner text-center">
        <div class="container">
            <a href="index.html" class="text-decoration-none text-light">
            <h1 class="display-2 fw-black mb-3 d-flex align-items-center gap-3 justify-content-center text-uppercase italic">
                <img src="Resources/Images/Logo.png" alt="Trans Liberation NCL Logo" class="img-fluid" style="max-height: 60px; width: auto;" />
                <span>Trans Liberation NCL</span>
            </h1>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="calendar-container mt-5">
            
            <!-- Calendar Header -->
            <div class="calendar-header d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-brutal" id="prevMonth">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <h2 class="h1 fw-black text-uppercase m-0" id="currentMonthYear">June 2026</h2>
                <button class="btn btn-brutal" id="nextMonth">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid">
                <!-- Day Names -->
                <div class="day-name">Mon</div>
                <div class="day-name">Tue</div>
                <div class="day-name">Wed</div>
                <div class="day-name">Thu</div>
                <div class="day-name">Fri</div>
                <div class="day-name">Sat</div>
                <div class="day-name">Sun</div>
            </div>
            <!-- Event Info Panel -->
            <div class="event-info-panel mt-5 p-4">
                <h3 class="h2 fw-black text-uppercase mb-3">Event Details</h3>
                <div id="event-details">
                    <p class="h5 mb-0 text-secondary">Select a date with a dot to see what's happening.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const monthYearText = document.getElementById('currentMonthYear');
            const calendarGrid = document.querySelector('.calendar-grid');
            const prevBtn = document.getElementById('prevMonth');
            const nextBtn = document.getElementById('nextMonth');
            const eventDetails = document.getElementById('event-details');

            let currentViewDate = new Date();

            // Use the parsed event map from our external script
            const getEventsForDate = (dateStr) => (window.EVENT_MAP && window.EVENT_MAP[dateStr]) || [];

            function renderCalendar(date) {
                const year = date.getFullYear();
                const month = date.getMonth();
                
                // Update Month/Year Header
                const monthName = date.toLocaleString('default', { month: 'long' });
                monthYearText.textContent = `${monthName} ${year}`;

                // Clear grid while preserving day-name headers
                const dayNames = Array.from(calendarGrid.querySelectorAll('.day-name'));
                calendarGrid.innerHTML = '';
                dayNames.forEach(dn => calendarGrid.appendChild(dn));

                // Get grid math (JS months are 0-indexed; Sunday is 0)
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                // Calculate offset for Monday-start calendar
                const offset = (firstDay === 0) ? 6 : firstDay - 1;

                // Add empty cells for padding
                for (let i = 0; i < offset; i++) {
                    const emptyDay = document.createElement('div');
                    emptyDay.className = 'calendar-day empty';
                    calendarGrid.appendChild(emptyDay);
                }

                // Render actual days
                const today = new Date();
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayEl = document.createElement('div');
                    dayEl.className = 'calendar-day';
                    
                    const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    const dayEvents = getEventsForDate(dateString);

                    if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                        dayEl.classList.add('today');
                    }

                    if (dayEvents.length > 0) {
                        dayEl.classList.add('has-event');
                        dayEl.innerHTML = `<span class="day-number">${day}</span><div class="event-dot"></div>`;
                        dayEl.addEventListener('click', () => {
                            eventDetails.innerHTML = dayEvents.map(event => `
                                <div class="mb-4">
                                    <h4 class="h3 fw-black text-uppercase mb-1">${event.title}</h4>
                                    <p class="h5 text-secondary ${event.link ? 'mb-2' : 'mb-0'}">${event.description}</p>
                                    ${event.link ? `<a href="${event.link}" target="_blank" rel="noopener" class="btn btn-brutal btn-sm">Organizing Page <i class="bi bi-box-arrow-up-right ms-1"></i></a>` : ''}
                                </div>
                            `).join('<div class="border-top border-4 border-black my-4"></div>');
                        });
                    } else {
                        dayEl.innerHTML = `<span class="day-number">${day}</span>`;
                        dayEl.addEventListener('click', () => {
                            eventDetails.innerHTML = '<p class="h5 mb-0 text-secondary">No events scheduled for this day.</p>';
                        });
                    }

                    calendarGrid.appendChild(dayEl);
                }
            }

            prevBtn.addEventListener('click', () => {
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                renderCalendar(currentViewDate);
            });

            nextBtn.addEventListener('click', () => {
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                renderCalendar(currentViewDate);
            });

            renderCalendar(currentViewDate);
        });
    </script>

</body>
</html>
